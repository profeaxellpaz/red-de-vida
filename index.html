<!DOCTYPE html>
<html lang="es-CR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Red de Vida — Asistencia</title>
  <link rel="manifest" href="manifest.json?v=18" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css?v=18" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">RV</span>
      <div>
        <strong id="empresaNombre">Red de Vida</strong>
        <small id="relojFecha"></small>
      </div>
    </div>
  </header>

  <div id="bannerInstalar" class="banner-instalar">
    <span>📲 Instala esta app en tu celular para usarla más rápido</span>
    <button id="btnInstalar" class="btn-install">Instalar</button>
    <button id="btnCerrarBanner" class="banner-cerrar" aria-label="Cerrar">&times;</button>
  </div>

  <main id="vista"></main>

  <nav class="tabbar">
    <button class="tab" data-vista="inicio">
      <span class="ti">🏠</span><span>Inicio</span>
    </button>
    <button class="tab" data-vista="eventos">
      <span class="ti">📅</span><span>Eventos</span>
    </button>
    <button class="tab" data-vista="colaboradores">
      <span class="ti">👥</span><span>Equipo</span>
    </button>
    <button class="tab" data-vista="reportes">
      <span class="ti">📊</span><span>Reportes</span>
    </button>
    <button class="tab" data-vista="ajustes">
      <span class="ti">⚙️</span><span>Ajustes</span>
    </button>
  </nav>

  <!-- Contenedor para diálogos/modales -->
  <div id="modal" class="modal" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="js/vendor/supabase.js?v=18"></script>
  <script src="js/config.js?v=18"></script>
  <script src="js/cloud.js?v=18"></script>
  <script src="js/app.js?v=18"></script>
</body>
</html>
