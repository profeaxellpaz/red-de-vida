<!DOCTYPE html>
<html lang="es-CR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Red de Vida — Asistencia</title>
  <link rel="manifest" href="manifest.json?v=14" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css?v=14" />
</head>
<body>
  <section id="login" class="login" hidden>
    <div class="login-card">
      <div class="login-logo">RV</div>
      <h1>Red de Vida</h1>
      <p class="muted">Control de asistencia</p>
      <label>Clave de acceso</label>
      <input type="password" id="loginPass" placeholder="Ingrese la clave compartida" autocomplete="current-password">
      <button class="btn block mt" id="loginBtn">Entrar</button>
      <p id="loginMsg" class="login-msg"></p>
      <button type="button" id="btnForzarActualizar" class="link-btn">¿No entra? Forzar actualización</button>
      <p class="muted" style="font-size:.7rem;margin:8px 0 0">versión 14</p>
    </div>
  </section>

  <header class="topbar">
    <div class="brand">
      <span class="logo">RV</span>
      <div>
        <strong id="empresaNombre">Red de Vida</strong>
        <small id="relojFecha"></small>
      </div>
    </div>
    <button id="btnInstalar" class="btn-install" hidden>Instalar app</button>
  </header>

  <main id="vista"></main>

  <nav class="tabbar">
    <button class="tab" data-vista="inicio">
      <span class="ti">🏠</span><span>Inicio</span>
    </button>
    <button class="tab" data-vista="eventos">
      <span class="ti">📅</span><span>Eventos</span>
    </button>
    <button class="tab" data-vista="colaboradores">
      <span class="ti">👥</span><span>Equipo</span>
    </button>
    <button class="tab" data-vista="reportes">
      <span class="ti">📊</span><span>Reportes</span>
    </button>
    <button class="tab" data-vista="ajustes">
      <span class="ti">⚙️</span><span>Ajustes</span>
    </button>
  </nav>

  <!-- Contenedor para diálogos/modales -->
  <div id="modal" class="modal" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="js/vendor/supabase.js?v=14"></script>
  <script src="js/config.js?v=14"></script>
  <script src="js/cloud.js?v=14"></script>
  <script src="js/app.js?v=14"></script>
</body>
</html>
